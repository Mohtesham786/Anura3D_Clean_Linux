name: Build and Test Fortran Code

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - uses: fortran-lang/setup-fortran@v1
        id: setup-fortran
        with:
          compiler: intel
          version: '2024.1'

      - name: Build Fortran code using Makefile
        run: |
          cd src
          make clean || true
          ifort --version || true
          make fortran_compiler=ifort FFLAGS="-O2" 2>&1 | tee build.log

      - name: Check executable exists
        run: |
          test -f src/Anura3D.out
          ls -lah src/Anura3D.out

      - name: Run Benchmark ColumCollapse
        run: |
          cd Benchmarks/CI_Tests/ColumCollapse.A3D

          echo "==== running ColumCollapse benchmark ===="
          pwd
          ls -lah

          project_name=$(basename "$(ls *.CPS_001 | head -n1)" .CPS_001)
          echo "Project: $project_name"

          rm -f run.log *.ENG *.INF *.MLG *.ERR *.PROC *.RX *.BRF_* *.vtk || true

          "$GITHUB_WORKSPACE/src/Anura3D.out" "$project_name" 2>&1 | tee run.log

          grep "Calculation finished." run.log

          if ! grep -q "Calculation finished." run.log; then
            echo "ERROR: ColumCollapse benchmark failed"
            exit 1
          fi

          test -f "${project_name}_001.ENG"
          test -f "${project_name}_001.INF"

      - name: Upload benchmark outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: columcollapse-output
          path: |
            Benchmarks/CI_Tests/ColumCollapse.A3D/*

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: src/build.log
